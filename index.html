<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Oxford ABE ReadyAnswers Quiz</title>

<style>
/* ================= THEME ================= */
:root {
  --bg-top: #0b1a4a;
  --bg-bottom: #050b2c;
  --text-main: #ffffff;
  --text-muted: rgba(255,255,255,0.8);
  --border-soft: rgba(255,255,255,0.4);
  --panel-soft: rgba(255,255,255,0.08);
}

/* ================= BASE ================= */
body {
  font-family: sans-serif;
  background: linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
  margin: 0;
  padding: 1rem;
  color: var(--text-main);
  font-size: 18px;
}

/* Remove italics everywhere */
i, em { font-style: normal !important; }

h1 {
  text-align: center;
  font-weight: 700;
  letter-spacing: 0.05em;
  margin-bottom: 1rem;
}

/* ================= CARD ================= */
.card {
  background: transparent;
  border-radius: 14px;
  padding: 1.5rem;
  margin: 1rem auto;
  max-width: 900px;
  position: relative;
}

/* ================= FORM CONTROLS ================= */
select, button, input {
  font-size: 1.1rem;
  padding: 0.65rem;
  border-radius: 8px;
  border: 1px solid var(--border-soft);
  background: var(--panel-soft);
  color: var(--text-main);
}

button {
  cursor: pointer;
  font-weight: 600;
  letter-spacing: 0.03em;
}

button:disabled {
  opacity: 0.4;
}

/* ================= QUESTION ================= */
.reference {
  font-size: 1rem;
  opacity: 0.8;
  margin-bottom: 0.5rem;
}

.question {
  font-size: 2.4rem;
  font-weight: 600;
  line-height: 1.35;
  margin: 1.5rem 0;
}

/* ================= TIMER ================= */
.timer {
  position: absolute;
  top: 12px;
  right: 16px;
  font-size: 1rem;
  font-weight: 600;
  color: var(--text-muted);
}

.timer-note {
  position: absolute;
  top: 34px;
  right: 16px;
  font-size: 0.75rem;
  color: var(--text-muted);
}

/* ================= ANSWER ================= */
.answer {
  margin-top: 1.5rem;
  padding: 1rem;
  border-radius: 10px;
  background: var(--panel-soft);
  display: none;
  font-size: 1.2rem;
}

/* ================= OPTIONS ================= */
.options {
  display: flex;
  gap: 1rem;
  justify-content: center;
  margin-top: 1.5rem;
}

.hidden { display: none; }

.got-it { border-color: #4CAF50; }
.incorrect { border-color: #f44336; }
.skip-btn { border-color: #9e9e9e; }

/* ================= MOBILE ================= */
@media (max-width: 480px) {
  body { font-size: 19px; }
  .question { font-size: 1.8rem; }
  .options { flex-direction: column; }
}
</style>
</head>

<body>
<h1>✝️ Oxford ABE ReadyAnswers</h1>

<!-- ================= QUIZ ================= -->
<div id="quiz" class="card hidden" style="position:relative;">
  <div class="timer" id="timer">30</div>
  <div class="timer-note" id="timerNote"></div>

  <div class="reference" id="ref"></div>
  <div class="question" id="qtext"></div>

  <div class="answer" id="answer"></div>

  <div class="options" id="preAnswerOptions">
    <input id="userInput" placeholder="Type your answer..." style="display:none;width:100%;">
    <button onclick="onShowAnswer()">Show Answer ❓</button>
    <button class="skip-btn" onclick="onSkip()">Skip ⏭️</button>
  </div>

  <div class="options hidden" id="markOptions">
    <button class="got-it" onclick="markAnswer(true)">✅ I Got It</button>
    <button class="incorrect" onclick="markAnswer(false)">❌ Incorrect</button>
  </div>

  <div style="margin-top:1rem;text-align:center;">
    <strong>Progress:</strong> <span id="progress"></span>
  </div>
</div>

<script>
/* ================= TIMER LOGIC ================= */
let quizQuestions = [
  { QuestionText:"Who wrote the book of Isaiah?", AnswerText:"Isaiah", MarkValue:1 },
  { QuestionText:"Explain Isaiah 9:6", AnswerText:"Prophecy about Jesus", MarkValue:4 }
];

let currentIdx = 0;
let timeLeft = 30;
let timerInterval = null;
let delayInterval = null;

/* ================= QUESTION DISPLAY ================= */
function showQuestion(){
  clearAllTimers();

  const q = quizQuestions[currentIdx];
  const marks = parseInt(q.MarkValue) || 1;

  document.getElementById("qtext").innerText = q.QuestionText;
  document.getElementById("answer").innerHTML = "<strong>Answer:</strong> " + q.AnswerText;
  document.getElementById("answer").style.display = "none";
  document.getElementById("progress").innerText =
    (currentIdx+1)+" / "+quizQuestions.length;

  /* 30s default, 35s if >3 marks */
  timeLeft = (marks > 3) ? 35 : 30;

  const timerEl = document.getElementById("timer");
  const noteEl  = document.getElementById("timerNote");

  timerEl.innerText = timeLeft;
  noteEl.innerText = "Starting in 5…";

  let delay = 5;

  delayInterval = setInterval(()=>{
    delay--;
    if(delay>0){
      noteEl.innerText = "Starting in "+delay+"…";
    } else {
      clearInterval(delayInterval);
      noteEl.innerText = "";

      timerInterval = setInterval(()=>{
        timeLeft--;
        timerEl.innerText = timeLeft;
        if(timeLeft<=0){
          clearInterval(timerInterval);
          timerEl.innerText = "⏰";
        }
      },1000);
    }
  },1000);
}

function clearAllTimers(){
  if(timerInterval) clearInterval(timerInterval);
  if(delayInterval) clearInterval(delayInterval);
}

/* ================= CONTROLS ================= */
function onShowAnswer(){
  clearAllTimers();
  document.getElementById("timerNote").innerText="";
  document.getElementById("answer").style.display="block";
  document.getElementById("preAnswerOptions").classList.add("hidden");
  document.getElementById("markOptions").classList.remove("hidden");
}

function onSkip(){
  clearAllTimers();
  next();
}

function markAnswer(){
  next();
}

function next(){
  document.getElementById("preAnswerOptions").classList.remove("hidden");
  document.getElementById("markOptions").classList.add("hidden");
  currentIdx++;
  if(currentIdx < quizQuestions.length){
    showQuestion();
  } else {
    alert("Quiz complete 🎉");
  }
}

/* START */
document.getElementById("quiz").classList.remove("hidden");
showQuestion();
</script>
</body>
</html>
